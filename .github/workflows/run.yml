# secrets required:
# SETTINGS_FILE
# PAT
name: Run Docker build of Village Crawler
on:
  workflow_dispatch:
  schedule:
  # from RELEASE POLARBEAR 1171.1, map.sql is updated every midnight server time
  # (which is 00:00 GMT+1 or 23:00 GMT)
  # we execute after 2 hour to make sure map.sql updated 
    - cron:  17 02 * * *
jobs:
  scan-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download setting file
        run: |
          curl -s -H "Authorization: token ${{ secrets.PAT }} " ${{ secrets.SETTINGS_FILE }}/appsettings.Production.lobbyserver.json -H "Accept: application/vnd.github.raw" > appsettings.Production.json
      - name: Run Docker container
        run: |
           docker run \
             -v $(pwd)/appsettings.Production.json:/app/appsettings.Production.json \
             ghcr.io/${{ github.repository_owner }}/lobby_server:latest
  mapsql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    needs: scan-server
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download setting file
        run: |
          curl -s -H "Authorization: token ${{ secrets.PAT }} " ${{ secrets.SETTINGS_FILE }}/appsettings.Production.mapsql.json -H "Accept: application/vnd.github.raw" > appsettings.Production.json
      - name: Run Docker container
        run: |
           docker run \
             -v $(pwd)/appsettings.Production.json:/app/appsettings.Production.json \
             ghcr.io/${{ github.repository_owner }}/map_sql:latest
