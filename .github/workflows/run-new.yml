# secrets required:
# SETTINGS_FILE
# PAT
name: Run Docker build of New account
on:
  workflow_dispatch:
  schedule:
    - cron:  26 6,15,23 * * *
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download setting file
        run: |
          curl -s -H "Authorization: token ${{ secrets.PAT }} " ${{ secrets.SETTINGS_URL }}/TravianAccountRegister/.env -H "Accept: application/vnd.github.raw" > .env
          curl -s -H "Authorization: token ${{ secrets.PAT }} " ${{ secrets.SETTINGS_URL }}/credentials_service_account_vinabot.json -H "Accept: application/vnd.github.raw" > credentials.json
      - name: Run Docker container
        run: |
           docker run \
             -v $(pwd)/.env:/app/.env \
             -v $(pwd)/credentials.json:/app/credentials.json \
             ghcr.io/${{ github.repository_owner }}/travian-lobby-register:latest
