name: Build and push lobby server image
on:
  workflow_call:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Checkout
        uses: actions/checkout@v4
     
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Build and push update image
        uses: docker/build-push-action@v6
        with:
          file: ./LobbyServer.Dockerfile
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lobby_server:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/lobby_server:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/lobby_server:cache,mode=max,compression=zstd,oci-mediatypes=true,image-manifest=true